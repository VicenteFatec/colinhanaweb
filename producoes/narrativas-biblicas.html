<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📖 Narrativas Bíblicas — Colinha na Web</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4A017;
            --gold-light: #F5D56E;
            --gold-dark: #A07A10;
            --cream: #FFF9EE;
            --cream-dark: #F5EDD6;
            --sky: #E8F0FE;
            --sky-blue: #B8D4F0;
            --white: #FFFFFF;
            --text: #3D2E1E;
            --text-light: #7A6B5A;
            --shadow: rgba(160,122,16,0.12);

            /* Cores por livro */
            --prov: #C0392B;
            --salm: #2980B9;
            --ecle: #27AE60;
            --tiago: #8E44AD;
            --tim1: #D35400;
            --tim2: #E67E22;
            --efes: #16A085;
            --mate: #2C3E50;
            --jo: #7D6608;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--cream);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 120px; /* espaço pro player fixo */
        }

        /* ====== FUNDO CELESTIAL ====== */
        .celestial-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .light-ray {
            position: absolute;
            width: 3px;
            background: linear-gradient(to bottom, rgba(212,160,23,0.15), transparent);
            top: 0;
            animation: rayShimmer 6s ease-in-out infinite;
        }

        @keyframes rayShimmer {
            0%,100% { opacity: 0.3; transform: scaleY(1); }
            50% { opacity: 0.7; transform: scaleY(1.1); }
        }

        .cloud {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            filter: blur(40px);
            animation: cloudFloat 20s ease-in-out infinite;
        }

        @keyframes cloudFloat {
            0%,100% { transform: translateX(0); }
            50% { transform: translateX(30px); }
        }

        /* ====== CONTAINER ====== */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        /* ====== HEADER ====== */
        .header {
            text-align: center;
            padding: 40px 20px 30px;
            animation: fadeDown 0.8s ease-out;
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-icon { font-size: 3em; display: block; margin-bottom: 8px; }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.4em;
            font-weight: 900;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
            margin-bottom: 6px;
        }

        .header-sub {
            font-size: 1.05em;
            color: var(--text-light);
            font-weight: 700;
        }

        .header-count {
            display: inline-block;
            margin-top: 10px;
            padding: 6px 18px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            color: white;
            font-family: 'Playfair Display', serif;
            font-weight: 800;
            font-size: 0.88em;
            border-radius: 50px;
            box-shadow: 0 3px 12px var(--shadow);
        }

        /* ====== TOOLBAR ====== */
        .toolbar {
            position: sticky;
            top: 0;
            z-index: 20;
            background: rgba(255,249,238,0.92);
            backdrop-filter: blur(12px);
            border-bottom: 2px solid rgba(212,160,23,0.12);
            padding: 12px 0;
            margin-bottom: 20px;
        }

        .toolbar-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 14px 10px 38px;
            border: 2px solid rgba(212,160,23,0.2);
            border-radius: 12px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.95em;
            font-weight: 700;
            background: white;
            color: var(--text);
            outline: none;
            transition: all 0.3s;
        }

        .search-box input:focus { border-color: var(--gold); box-shadow: 0 0 12px var(--shadow); }
        .search-box input::placeholder { color: #C4B89A; }

        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1em;
            pointer-events: none;
        }

        .filter-btns {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .fbtn {
            padding: 6px 12px;
            border-radius: 50px;
            border: 2px solid rgba(212,160,23,0.15);
            background: white;
            font-family: 'Nunito', sans-serif;
            font-size: 0.78em;
            font-weight: 800;
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .fbtn:hover { border-color: var(--gold); color: var(--gold); transform: translateY(-1px); }
        .fbtn.active { background: var(--gold); color: white; border-color: var(--gold); }

        .fav-toggle {
            padding: 6px 14px;
            border-radius: 50px;
            border: 2px solid rgba(212,160,23,0.15);
            background: white;
            font-size: 0.82em;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Nunito', sans-serif;
            color: var(--text-light);
        }

        .fav-toggle.active { background: #FFF0D0; border-color: var(--gold); color: var(--gold-dark); }

        /* ====== GRID DE CARDS ====== */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
            padding-bottom: 30px;
        }

        .audio-card {
            background: white;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: all 0.3s ease;
            animation: cardIn 0.5s ease-out both;
            border: 2px solid transparent;
            position: relative;
        }

        .audio-card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px var(--shadow); }
        .audio-card.playing { border-color: var(--gold); box-shadow: 0 0 25px var(--shadow); }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-banner {
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .card-banner-text {
            font-family: 'Playfair Display', serif;
            font-weight: 800;
            font-size: 0.85em;
            color: white;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 1;
            text-shadow: 0 2px 6px rgba(0,0,0,0.35);
        }

        .card-num {
            position: absolute;
            right: 10px;
            top: 10px;
            width: 26px; height: 26px;
            border-radius: 50%;
            background: rgba(255,255,255,0.25);
            color: white;
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: 0.72em;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .card-body { padding: 14px 16px; }

        .card-title-text {
            font-family: 'Playfair Display', serif;
            font-weight: 800;
            font-size: 1.05em;
            color: var(--text);
            line-height: 1.3;
            margin-bottom: 6px;
        }

        .card-ref {
            font-size: 0.82em;
            color: var(--text-light);
            font-weight: 700;
        }

        .card-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px 14px;
        }

        .card-play-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 50px;
            border: none;
            font-family: 'Nunito', sans-serif;
            font-size: 0.82em;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
        }

        .card-play-btn:hover { transform: scale(1.05); filter: brightness(1.1); }

        .card-fav-btn {
            width: 34px; height: 34px;
            border-radius: 50%;
            border: 2px solid rgba(212,160,23,0.15);
            background: white;
            font-size: 1em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .card-fav-btn:hover { border-color: var(--gold); transform: scale(1.1); }
        .card-fav-btn.faved { background: #FFF0D0; border-color: var(--gold); }

        .playing-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            display: none;
        }

        .audio-card.playing .playing-indicator { display: flex; gap: 3px; align-items: flex-end; }

        .eq-bar {
            width: 4px;
            border-radius: 2px;
            background: white;
            animation: eqPulse 0.8s ease-in-out infinite;
        }

        .eq-bar:nth-child(1) { height: 14px; animation-delay: 0s; }
        .eq-bar:nth-child(2) { height: 20px; animation-delay: 0.15s; }
        .eq-bar:nth-child(3) { height: 10px; animation-delay: 0.3s; }
        .eq-bar:nth-child(4) { height: 16px; animation-delay: 0.1s; }

        @keyframes eqPulse {
            0%,100% { transform: scaleY(0.4); }
            50% { transform: scaleY(1); }
        }

        /* ====== NO RESULTS ====== */
        .no-results {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-light);
            font-weight: 700;
            font-size: 1.1em;
            grid-column: 1 / -1;
        }

        /* ====== PLAYER FIXO ====== */
        .player-bar {
            position: fixed;
            bottom: 0; left: 0;
            width: 100%;
            z-index: 50;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(16px);
            border-top: 2px solid rgba(212,160,23,0.15);
            box-shadow: 0 -4px 30px rgba(0,0,0,0.08);
            display: none;
        }

        .player-bar.visible { display: block; }

        .progress-bar-container {
            width: 100%;
            height: 5px;
            background: var(--cream-dark);
            cursor: pointer;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold), var(--gold-light));
            width: 0%;
            border-radius: 0 3px 3px 0;
            transition: width 0.2s linear;
        }

        .player-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .player-info {
            flex: 1;
            min-width: 0;
        }

        .player-title {
            font-family: 'Playfair Display', serif;
            font-weight: 800;
            font-size: 0.95em;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-ref {
            font-size: 0.78em;
            color: var(--text-light);
            font-weight: 700;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pc-btn {
            width: 38px; height: 38px;
            border-radius: 50%;
            border: none;
            background: transparent;
            font-size: 1.2em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: var(--text);
        }

        .pc-btn:hover { background: var(--cream-dark); transform: scale(1.1); }

        .pc-btn-main {
            width: 48px; height: 48px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            color: white;
            font-size: 1.4em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 3px 12px var(--shadow);
        }

        .pc-btn-main:hover { transform: scale(1.08); filter: brightness(1.1); }

        .player-time {
            font-family: 'Nunito', sans-serif;
            font-size: 0.75em;
            font-weight: 700;
            color: var(--text-light);
            white-space: nowrap;
        }

        /* ====== FOOTER ====== */
        .footer {
            text-align: center;
            padding: 30px 20px;
            color: #C4B89A;
            font-weight: 700;
            font-size: 0.9em;
        }

        .footer a { color: var(--gold); text-decoration: none; }

        /* ====== RESPONSIVO ====== */
        @media (max-width: 600px) {
            .header h1 { font-size: 1.8em; }
            .cards-grid { grid-template-columns: 1fr; }
            .player-inner { gap: 10px; padding: 8px 12px; }
            .player-title { font-size: 0.85em; }
            .pc-btn { width: 32px; height: 32px; font-size: 1em; }
            .pc-btn-main { width: 42px; height: 42px; font-size: 1.2em; }
            .toolbar-inner { flex-direction: column; }
            .filter-btns { justify-content: center; }
        }

        /* Botão Voltar — Colinha na Web */
        .btn-voltar {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--gold-dark);
            color: white;
            font-family: 'Nunito', sans-serif;
            font-size: 0.95rem;
            font-weight: 800;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 50px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.2);
            transition: transform 0.2s, box-shadow 0.2s;
            min-height: 44px;
            min-width: 44px;
        }
        .btn-voltar:hover { transform: scale(1.05); }
        .btn-voltar:active { transform: scale(0.97); }
        .btn-voltar-seta { font-size: 1.2rem; }
        @media (max-width: 480px) {
            .btn-voltar { font-size: 0.85rem; padding: 8px 14px; }
        }
    </style>
</head>

<a href="../index.html" class="btn-voltar">

<div class="celestial-bg" id="celestialBg"></div>

<!-- TOOLBAR -->
<div class="toolbar">
    <div class="toolbar-inner">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar passagem..." oninput="filterCards()">
        </div>
        <div class="filter-btns" id="filterBtns"></div>
        <button class="fav-toggle" id="favToggle" onclick="toggleFavFilter()">⭐ Favoritos</button>

<div class="container">

    <div class="footer">
        Feito com 💛 e fé — <a href="https://colinhanaweb.com.br">colinhanaweb.com.br</a>
    </div>
</div>

<!-- PLAYER FIXO -->
<div class="player-bar" id="playerBar">
    <div class="progress-bar-container" id="progressContainer" onclick="seekAudio(event)">
        <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="player-inner">
        <div class="player-info">
            <div class="player-title" id="playerTitle">—</div>
            <div class="player-ref" id="playerRef">Selecione uma passagem</div>
        </div>
        <div class="player-controls">
            <button class="pc-btn" onclick="prevTrack()" title="Anterior">⏮</button>
            <button class="pc-btn-main" id="playPauseBtn" onclick="togglePlayPause()">▶</button>
            <button class="pc-btn" onclick="nextTrack()" title="Próxima">⏭</button>
        </div>
        <div class="player-time">
            <span id="timeCurrent">0:00</span> / <span id="timeTotal">0:00</span>
        </div>
    </div>
</div>

function init() {

// ====== FUNDO CELESTIAL ======
function buildCelestialBg() {
    var bg = document.getElementById('celestialBg');
    var html = '';
    // Raios de luz
    for (var i = 0; i < 8; i++) {
        var left = 10 + Math.random() * 80;
        var height = 40 + Math.random() * 60;
        var delay = Math.random() * 6;
        html += '<div class="light-ray" style="left:'+left+'%;height:'+height+'%;animation-delay:'+delay+'s;"></div>';
    }
    // Nuvens
    var cloudConfigs = [
        {w:300,h:100,top:'5%',left:'-5%',delay:'0s'},
        {w:250,h:80,top:'15%',right:'0%',delay:'5s'},
        {w:200,h:70,top:'60%',left:'10%',delay:'10s'},
        {w:280,h:90,top:'70%',right:'5%',delay:'3s'}
    ];
    cloudConfigs.forEach(function(c){
        var pos = c.left ? 'left:'+c.left : 'right:'+c.right;
        html += '<div class="cloud" style="width:'+c.w+'px;height:'+c.h+'px;top:'+c.top+';'+pos+';animation-delay:'+c.delay+';"></div>';
    });
    bg.innerHTML = html;
}

// ====== FILTROS POR LIVRO ======
function buildFilterButtons() {
    var books = ['Todos'];
    passages.forEach(function(p) { if (books.indexOf(p.book) === -1) books.push(p.book); });

    var container = document.getElementById('filterBtns');
    var html = '';
    books.forEach(function(b) {
        var cls = b === 'Todos' ? 'fbtn active' : 'fbtn';
        var emoji = b === 'Todos' ? '📚 ' : (bookEmojis[b] || '📖') + ' ';
        html += '<button class="'+cls+'" data-book="'+b+'" onclick="setFilter(\''+b+'\',this)">'+emoji+b+'</button>';
    });
    container.innerHTML = html;
}

// ====== CARDS ======
function buildCards() {
    var grid = document.getElementById('cardsGrid');
    var search = document.getElementById('searchInput').value.toLowerCase();
    var html = '';
    var visibleCount = 0;

    passages.forEach(function(p, idx) {
        // Filtros
        if (activeFilter !== 'Todos' && p.book !== activeFilter) return;
        if (showFavsOnly && !favorites[p.id]) return;
        var searchStr = (p.book + ' ' + p.ref + ' ' + p.title).toLowerCase();
        if (search && searchStr.indexOf(search) === -1) return;

        visibleCount++;
        var delay = visibleCount * 0.04;
        var isFav = favorites[p.id] ? 'faved' : '';
        var isActive = currentTrack === idx ? 'playing' : '';

        html += '<div class="audio-card '+isActive+'" id="card-'+idx+'" style="animation-delay:'+delay+'s" onclick="playTrack('+idx+')">';
        html += '<div class="card-banner" style="background:'+p.color+';">';
        html += '<div class="playing-indicator"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>';
        html += '<span class="card-banner-text">'+(bookEmojis[p.book]||'📖')+' '+p.book+'</span>';
        html += '<span class="card-num">'+p.id+'</span>';
        html += '</div>';
        html += '<div class="card-body">';
        html += '<div class="card-title-text">'+p.title+'</div>';
        html += '<div class="card-ref">'+p.book+' '+p.ref+'</div>';
        html += '</div>';
        html += '<div class="card-actions">';
        html += '<button class="card-play-btn" style="background:'+p.color+';" onclick="event.stopPropagation(); playTrack('+idx+');">'+(currentTrack===idx && isPlaying ? '⏸ Pausar' : '▶ Ouvir')+'</button>';
        html += '<button class="card-fav-btn '+isFav+'" onclick="event.stopPropagation(); toggleFav('+p.id+');">'+(favorites[p.id] ? '⭐' : '☆')+'</button>';
        html += '</div></div>';
    });

    if (visibleCount === 0) {
        html = '<div class="no-results">😔 Nenhuma passagem encontrada.</div>';
    }

    grid.innerHTML = html;
}

// ====== FILTRO ======
function setFilter(book, btn) {
    activeFilter = book;
    document.querySelectorAll('.fbtn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    buildCards();
}

function filterCards() { buildCards(); }

function toggleFavFilter() {
    showFavsOnly = !showFavsOnly;
    var btn = document.getElementById('favToggle');
    if (showFavsOnly) btn.classList.add('active');
    else btn.classList.remove('active');
    buildCards();
}

// ====== FAVORITOS ======
function toggleFav(id) {
    if (favorites[id]) delete favorites[id];
    else favorites[id] = true;
    buildCards();
}

// ====== PLAYER ======
function playTrack(idx) {
    var bar = document.getElementById('playerBar');

    if (currentTrack === idx && isPlaying) {
        audio.pause();
        isPlaying = false;
        updatePlayBtn();
        buildCards();
        return;
    }

    if (currentTrack === idx && !isPlaying) {
        audio.play();
        isPlaying = true;
        updatePlayBtn();
        buildCards();
        return;
    }

    currentTrack = idx;
    var p = passages[idx];
    // Caminho do áudio — Claude Code vai ajustar isso no deploy
    audio.src = 'audio/' + p.file;
    audio.play().catch(function(){});
    isPlaying = true;

    document.getElementById('playerTitle').textContent = p.title;
    document.getElementById('playerRef').textContent = p.book + ' ' + p.ref;
    bar.classList.add('visible');

    updatePlayBtn();
    buildCards();
}

function togglePlayPause() {
    if (currentTrack === -1) return;
    if (isPlaying) { audio.pause(); isPlaying = false; }
    else { audio.play(); isPlaying = true; }
    updatePlayBtn();
    buildCards();
}

function updatePlayBtn() {
    document.getElementById('playPauseBtn').textContent = isPlaying ? '⏸' : '▶';
}

function prevTrack() {
    if (currentTrack <= 0) playTrack(passages.length - 1);
    else playTrack(currentTrack - 1);
}

function nextTrack() {
    if (currentTrack >= passages.length - 1) playTrack(0);
    else playTrack(currentTrack + 1);
}

function seekAudio(e) {
    if (!audio.duration) return;
    var rect = document.getElementById('progressContainer').getBoundingClientRect();
    var pct = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
}

function formatTime(s) {
    if (isNaN(s)) return '0:00';
    var m = Math.floor(s / 60);
    var sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
}

// ====== EVENTOS DO ÁUDIO ======
function setupAudioEvents() {
    audio.addEventListener('timeupdate', function() {
        if (!audio.duration) return;
        var pct = (audio.currentTime / audio.duration) * 100;
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('timeCurrent').textContent = formatTime(audio.currentTime);
    });

    audio.addEventListener('loadedmetadata', function() {
        document.getElementById('timeTotal').textContent = formatTime(audio.duration);
    });

    audio.addEventListener('ended', function() {
        // Auto-play próxima faixa (playlist)
        nextTrack();
    });

    audio.addEventListener('pause', function() {
        isPlaying = false;
        updatePlayBtn();
    });

    audio.addEventListener('play', function() {
        isPlaying = true;
        updatePlayBtn();
    });
}

// ====== INICIAR ======
init();
</script>

</body>
